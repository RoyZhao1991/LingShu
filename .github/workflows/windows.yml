name: Windows

on:
  push:
    branches:
      - main
    tags:
      - "windows-v*"
    paths:
      - "WindowsApp/**"
      - "Runtime/LingShuCore/**"
      - "Runtime/Grok/crates/codegen/lingshu-grok-runtime/**"
      - "Tests/LingShuMacTests/KernelABIContractTests.swift"
      - ".github/workflows/windows.yml"
  pull_request:
    branches:
      - main
    paths:
      - "WindowsApp/**"
      - "Runtime/LingShuCore/**"
      - "Runtime/Grok/crates/codegen/lingshu-grok-runtime/**"
      - "Tests/LingShuMacTests/KernelABIContractTests.swift"
      - ".github/workflows/windows.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows x64 installers
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: WindowsApp/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Set up Python for the bundled DesignKB generator
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: WindowsApp
        run: npm ci

      - name: Build the self-contained DesignKB generator
        run: |
          python -m pip install --disable-pip-version-check python-pptx pillow pyinstaller
          $bin = Join-Path $env:GITHUB_WORKSPACE "Resources/DesignKB/bin"
          $work = Join-Path $env:RUNNER_TEMP "designkb-pyinstaller"
          $spec = Join-Path $env:RUNNER_TEMP "designkb-spec"
          New-Item -ItemType Directory -Force -Path $bin, $work, $spec | Out-Null
          python -m PyInstaller --noconfirm --clean --onefile --name designkb-generator --distpath $bin --workpath $work --specpath $spec Resources/DesignKB/generator.py
          $helper = Join-Path $bin "designkb-generator.exe"
          if (-not (Test-Path $helper)) {
            throw "The self-contained DesignKB generator was not produced."
          }
          $smokeInput = Join-Path $env:RUNNER_TEMP "designkb-smoke.json"
          $smokeOutput = Join-Path $env:RUNNER_TEMP "designkb-smoke.pptx"
          @{
            title = "DesignKB Windows smoke test"
            theme = "midnight"
            slides = @(
              @{
                layout = "cover"
                title = "DesignKB Windows smoke test"
                subtitle = "Bundled generator verified"
              }
            )
          } | ConvertTo-Json -Depth 8 | Set-Content -Path $smokeInput -Encoding utf8
          & $helper $smokeInput $smokeOutput (Join-Path $env:GITHUB_WORKSPACE "Resources/DesignKB")
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path $smokeOutput) -or (Get-Item $smokeOutput).Length -lt 1000) {
            throw "The bundled DesignKB generator failed its real PowerPoint smoke test."
          }
          Write-Host "Bundled DesignKB generator: $helper"

      - name: Verify shared runtime kernel
        run: cargo test --manifest-path Runtime/LingShuCore/Cargo.toml

      - name: Verify full-access public HTTPS through shared runtime
        run: cargo test --manifest-path Runtime/LingShuCore/Cargo.toml engine::tests::full_access_permits_public_https_on_windows -- --ignored --exact

      - name: Verify frontend
        working-directory: WindowsApp
        run: npm run build

      - name: Build MSI and NSIS installers
        working-directory: WindowsApp
        run: npm run tauri -- build

      - name: Collect installers and checksums
        run: |
          $bundle = Join-Path $env:GITHUB_WORKSPACE "WindowsApp/src-tauri/target/release/bundle"
          $output = Join-Path $env:GITHUB_WORKSPACE "dist/windows"
          New-Item -ItemType Directory -Force -Path $output | Out-Null
          $msiInstallers = @(Get-ChildItem -Path $bundle -Recurse -File | Where-Object { $_.Extension -eq ".msi" })
          $nsisInstallers = @(Get-ChildItem -Path $bundle -Recurse -File | Where-Object { $_.Name -like "*-setup.exe" })
          if ($msiInstallers.Count -lt 1 -or $nsisInstallers.Count -ne 1) {
            throw "Expected at least one MSI and exactly one NSIS installer; found $($msiInstallers.Count) MSI and $($nsisInstallers.Count) NSIS."
          }
          foreach ($installer in $msiInstallers) {
            Copy-Item $installer.FullName -Destination $output
          }
          Copy-Item $nsisInstallers[0].FullName -Destination (Join-Path $output "Nous-Windows-x64-Setup.exe")
          $checksumLines = @(Get-ChildItem $output -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)"
          })
          $checksumPath = Join-Path $output "SHA256SUMS.txt"
          $checksumText = ($checksumLines -join "`n") + "`n"
          [System.IO.File]::WriteAllText($checksumPath, $checksumText, [System.Text.UTF8Encoding]::new($false))
          Get-ChildItem $output -File | Format-Table Name, Length

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: Nous-Windows-x64
          path: dist/windows/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish tagged Windows preview
        if: startsWith(github.ref, 'refs/tags/windows-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --prerelease --title "Nous (LingShu) Windows Technical Preview 0.1.0-7" --notes "Windows x64 technical preview built and tested on GitHub's Windows runner. This build adds the shared Runtime Core plugin contract and the complete bundled DesignKB presentation system. Plugins are registered as model-callable tools, declare permissions, can be installed, enabled, probed, and removed from the Windows plugin page, and register real output files in the same artifact ledger. DesignKB ships with its layouts, palettes, typography, icons, rubric, and a self-contained Windows generator, so polished PowerPoint delivery does not require a separate Python installation. The release retains Full Access propagation, attachment cards, responsive Markdown tables, document extraction and preview, GoalSpec, serialized main tasks, isolated child sessions, human-action resume, and independent checking. Direct computer control and realtime audio/video perception are not included in this preview."
          }
          gh release upload $tag dist/windows/* --repo $env:GITHUB_REPOSITORY --clobber
