name: Windows

on:
  push:
    branches:
      - main
    paths:
      - "WindowsApp/**"
      - "Runtime/LingShuCore/**"
      - "Runtime/Grok/crates/codegen/lingshu-grok-runtime/**"
      - "Tests/LingShuMacTests/KernelABIContractTests.swift"
      - ".github/workflows/windows.yml"
  pull_request:
    branches:
      - main
    paths:
      - "WindowsApp/**"
      - "Runtime/LingShuCore/**"
      - "Runtime/Grok/crates/codegen/lingshu-grok-runtime/**"
      - "Tests/LingShuMacTests/KernelABIContractTests.swift"
      - ".github/workflows/windows.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows x64 installers
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: WindowsApp/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install frontend dependencies
        working-directory: WindowsApp
        run: npm ci

      - name: Verify shared runtime kernel
        run: cargo test --manifest-path Runtime/LingShuCore/Cargo.toml

      - name: Verify frontend
        working-directory: WindowsApp
        run: npm run build

      - name: Build MSI and NSIS installers
        working-directory: WindowsApp
        run: npm run tauri -- build

      - name: Collect installers and checksums
        run: |
          $bundle = Join-Path $env:GITHUB_WORKSPACE "WindowsApp/src-tauri/target/release/bundle"
          $output = Join-Path $env:GITHUB_WORKSPACE "dist/windows"
          New-Item -ItemType Directory -Force -Path $output | Out-Null
          $installers = @(Get-ChildItem -Path $bundle -Recurse -File | Where-Object { $_.Extension -eq ".msi" -or $_.Name -like "*-setup.exe" })
          if ($installers.Count -lt 2) {
            throw "Expected MSI and NSIS installers, found $($installers.Count)."
          }
          foreach ($installer in $installers) {
            Copy-Item $installer.FullName -Destination $output
          }
          Get-ChildItem $output -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)"
          } | Set-Content -Encoding utf8 (Join-Path $output "SHA256SUMS.txt")
          Get-ChildItem $output -File | Format-Table Name, Length

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: LingShu-Windows-x64
          path: dist/windows/*
          if-no-files-found: error
          retention-days: 30
