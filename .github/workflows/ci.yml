name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-tests:
    name: Swift tests
    runs-on: macos-15
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show toolchain
        run: swift --version

      - name: Run tests
        run: swift test
